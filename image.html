<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

  <h1>Image Gallery</h1>

  <div class="gallery">
    <img src="https://picsum.photos/id/1015/400/300" onclick="openLightbox(0)">
    <img src="https://picsum.photos/id/1016/400/300" onclick="openLightbox(1)">
    <img src="https://picsum.photos/id/1018/400/300" onclick="openLightbox(2)">
    <img src="https://picsum.photos/id/1020/400/300" onclick="openLightbox(3)">
    <img src="https://picsum.photos/id/1024/400/300" onclick="openLightbox(4)">
    <img src="https://picsum.photos/id/1027/400/300" onclick="openLightbox(5)">
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="close" onclick="closeLightbox()">x</div>
    <img id="lightbox-img">
    <button class="prev" onclick="changeImage(-1)">❮</button>
    <button class="next" onclick="changeImage(1)">❯</button>
  </div>

  <script src="script2.js"></script>
</body>
</html>
